app = "recon-kit-sntimmons"
primary_region = "dfw"

[env]
  PORT = "8080"
  RK_DATA_DIR = "/data"
  RK_RUNS_DIR = "/data/dashboard_runs"
  RK_JOBS_DB = "/data/jobs.sqlite3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "recon_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
