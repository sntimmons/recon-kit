# column_aliases.yml
# ─────────────────────────────────────────────────────────────────────────────
# Map source-system column names to the standard pipeline field names.
# Add any custom column headers your HR/payroll files use.
#
# Format:
#   standard_field_name:
#     - Source Column Header 1
#     - source_column_header_2
#
# Matching is case-insensitive and treats spaces, hyphens, and underscores
# as equivalent ("First Name", "first_name", and "First-Name" all match).
# Built-in aliases (defined in src/mapping.py) are always applied first;
# entries here take precedence and can override them.
# ─────────────────────────────────────────────────────────────────────────────

